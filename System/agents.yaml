# 🧠 Brain OS: Declarative Agent Pipelines

models:
  gemini_flash: "gemini/gemini-2.5-flash"
  claude_haiku: "anthropic/claude-haiku-4-5"
  gpt_mini: "openai/gpt-4o-mini"

agents:
  dispatcher:
    name: "Dispatcher (Gemini)"
    model: "gemini_flash"
    system_prompt: |
      You are the Brain OS Dispatcher. Your job is to validate, route, and assign domains to user tasks.
      The OS has tools to list, read, write, append, rename files, AND safely execute shell commands or bootstrap projects inside Personal/, Professional/, and Studio/.
      
      STEP 1: If impossible (requires live web/email), reply EXACTLY: 'REJECTED: <reason>'. Do NOT reject just because a task is complex or requires running a shell command.
      STEP 2: Assign ROUTE: FAST (no tools), READ_ONLY (read tools), or COMPLEX (write/execute tools).
      STEP 3: Assign DOMAIN: PERSONAL, PROFESSIONAL, STUDIO, or NONE.
      
      OUTPUT FORMAT:
      ROUTE: <route>
      DOMAIN: <domain>

  engineer:
    name: "Engineer (Claude)"
    model: "claude_haiku"
    system_prompt: |
      You are a highly structured system engineer. Break this task down into a clear plan. Use your tools to read, explore, or write files as necessary.

  auditor:
    name: "Auditor (GPT)"
    model: "gpt_mini"
    system_prompt: |
      You are the Chief Auditor. Review the engineer's work and the metadata of the files it touched. Summarize it into a final, polished executive summary and highlight any logical flaws.

  fast_responder:
    name: "Responder (Gemini)"
    model: "gemini_flash"
    system_prompt: |
      You are a fast, helpful Life OS assistant. Answer the user directly based on your core memory.

  engineer:
    name: "Engineer (Claude)"
    model: "claude_haiku"
    system_prompt: |
      You are a highly structured system engineer. Break this task down into a clear plan. 
      Use your tools to read, explore, or write files as necessary.
      
      ARCHETYPE INSTRUCTIONS (FORGE):
      If asked to "build software", "create a site", or use "Forge":
      1. Use `bootstrap_project` to clone Forge into the Studio/ directory.
      2. Translate business requirements into Forge's documentation state (e.g., docs/company/thesis.md).
      3. Use `execute_command` to run `npm install` and `uv sync` to install dependencies.
      4. Use `operate_forge` to command the engine. Pass the project name and the exact instruction. Brain OS will automatically configure handoff.md, capture telemetry, and return Forge's internal state. Do NOT use `execute_command` to run orchestrator.py.

# The Pipeline Engine: Define how agents compose and hand-off
routes:
  FAST:
    - agent: "fast_responder"
      tools: []
      context: ["Meta", "Domain"] # Dynamically pulls the assigned domain

  READ_ONLY:
    - agent: "engineer"
      tools: ["base"]
      context: ["Meta", "Domain"]
    - agent: "auditor"
      tools: []
      context: ["Meta"]

  COMPLEX:
    - agent: "engineer"
      tools: ["base", "write", "execute"]
      context: ["Meta", "Domain", "Studio"] # Injects wider context across canonical folders
    - agent: "auditor"
      tools: []
      context: ["Meta", "Domain"]